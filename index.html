<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>Лунный свет | Ты не одна</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a1a1f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      padding: 1rem;
      margin: 0;
    }

    .forest-container {
      position: relative;
      width: 100%;
      max-width: 720px;
      background: #0b1c24;
      border-radius: 3rem 3rem 2.5rem 2.5rem;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(90, 180, 200, 0.25);
      aspect-ratio: 4 / 5;
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 50% 20%, #1a3a44 5%, #0b1c24 70%);
    }

    .sky-forest {
      position: relative;
      flex: 1;
      width: 100%;
      background: linear-gradient(180deg, #0b2833 0%, #0f2a2f 40%, #142f2b 100%);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .moon {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: 28%;
      aspect-ratio: 1/1;
      background: radial-gradient(circle at 30% 30%, #fffde7, #f7e9c3 30%, #e6d7a3 80%);
      border-radius: 50%;
      box-shadow: 0 0 70px rgba(255, 250, 210, 0.9), 0 0 140px rgba(240, 220, 140, 0.7), 0 0 200px rgba(200, 200, 120, 0.5);
      z-index: 2;
    }

    .moon::before {
      content: "";
      position: absolute;
      top: 25%;
      left: 25%;
      width: 20%;
      height: 20%;
      background: rgba(180, 160, 110, 0.4);
      border-radius: 50%;
      box-shadow: 35px 15px 0 -2px rgba(160, 140, 90, 0.5), 10px 45px 0 1px rgba(150, 130, 80, 0.5), -10px 30px 0 -3px rgba(170, 150, 90, 0.5);
    }

    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65%;
      z-index: 3;
      pointer-events: none;
    }

    .tree-silhouette {
      position: absolute;
      bottom: 0;
      background: #0a181c;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .tree1 {
      left: 5%;
      width: 14%;
      height: 60%;
      background: #081a1b;
      border-radius: 40% 60% 0 0;
      box-shadow: 5px -10px 15px rgba(0,0,0,0.7);
    }
    .tree2 {
      left: 22%;
      width: 12%;
      height: 70%;
      background: #0c1e1f;
      border-radius: 30% 70% 0 0;
    }
    .tree3 {
      left: 38%;
      width: 16%;
      height: 75%;
      background: #091817;
      border-radius: 50% 50% 0 0;
      box-shadow: -8px -5px 12px rgba(0,0,0,0.6);
    }
    .tree4 {
      left: 58%;
      width: 14%;
      height: 65%;
      background: #0a1c1d;
      border-radius: 35% 65% 0 0;
    }
    .tree5 {
      left: 75%;
      width: 13%;
      height: 68%;
      background: #081716;
      border-radius: 40% 60% 0 0;
    }
    .tree6 {
      left: 88%;
      width: 12%;
      height: 55%;
      background: #0b1f1e;
      border-radius: 30% 70% 0 0;
    }

    .branch {
      position: absolute;
      background: #0a181c;
      height: 8%;
      width: 25%;
      border-radius: 0 60% 20% 0;
    }

    .fog {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30%;
      background: linear-gradient(to top, rgba(180, 210, 210, 0.15), transparent);
      z-index: 4;
    }

    .content-panel {
      position: relative;
      background: rgba(8, 25, 30, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 2px solid rgba(70, 160, 160, 0.5);
      padding: 1.6rem 1.2rem 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      z-index: 10;
      box-shadow: 0 -10px 30px rgba(0, 20, 20, 0.7);
    }

    .message {
      color: #d4f0f0;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-align: center;
      text-shadow: 0 2px 6px #0a2020;
      background: rgba(15, 45, 45, 0.5);
      padding: 0.5rem 1.2rem;
      border-radius: 3rem;
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 0.2rem 0 0.4rem;
    }

    .night-btn {
      background: rgba(20, 70, 75, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid #3a9090;
      color: #c5f0f0;
      padding: 0.8rem 1.6rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.6px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(145deg, #1e4f55, #0c353a);
      box-shadow: 0 5px 12px rgba(0, 20, 20, 0.6), 0 0 8px rgba(50, 150, 150, 0.5);
      text-shadow: 0 1px 4px #032020;
    }

    .night-btn:hover {
      background: linear-gradient(145deg, #256a70, #134b4f);
      border-color: #6ad4d4;
      color: #e8ffff;
      box-shadow: 0 8px 18px rgba(0, 30, 30, 0.9), 0 0 16px #4db8b8;
      transform: translateY(-2px);
    }

    .night-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.6);
    }

    .animation-stage {
      position: relative;
      width: 100%;
      height: 120px;
      margin-top: 0.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2rem;
      overflow: visible;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .caption {
      color: #aacfcf;
      font-size: 0.8rem;
      margin-top: 0.1rem;
      opacity: 0.9;
    }

    @media (max-width: 450px) {
      .night-btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="forest-container">
    <div class="sky-forest">
      <div class="moon"></div>
      <div class="trees">
        <div class="tree-silhouette tree1"></div>
        <div class="tree-silhouette tree2"></div>
        <div class="tree-silhouette tree3"></div>
        <div class="tree-silhouette tree4"></div>
        <div class="tree-silhouette tree5"></div>
        <div class="tree-silhouette tree6"></div>
      </div>
      <div class="fog"></div>
    </div>

    <div class="content-panel">
      <div class="message" id="statusMessage">
        Ты в моём сердце, даже за тысячи километров 🌙
      </div>
      <div class="buttons">
        <button class="night-btn" id="hugBtn">🤍 Обнять</button>
        <button class="night-btn" id="replayBtn">🔄 Ещё раз</button>
      </div>
      <div class="animation-stage">
        <canvas id="storyCanvas" width="300" height="120"></canvas>
      </div>
      <div class="caption">палочки, но тепло</div>
    </div>
  </div>
<script>
  (function() {
    const canvas = document.getElementById('storyCanvas');
    const ctx = canvas.getContext('2d');

    // Элементы для сообщений
    const statusDiv = document.getElementById('statusMessage');

    // Состояния анимации
    let animationId = null;
    let currentScene = 'idle'; // idle, hugging, carLeaving, complete
    let progress = 0; // 0 до 1

    // Параметры фигур (палочные человечки)
    const leftPerson = { baseX: 105, groundY: 90 };
    const rightPerson = { baseX: 175, groundY: 90 };

    // Машина (упрощённая)
    const car = {
      x: 240,
      y: 70,
      width: 48,
      height: 22,
      wheelRadius: 6,
    };

    // Функция остановки анимации
    function stopAnimation() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    // Рисование палочного человека
    function drawStickPerson(x, y, options = {}) {
      const {
        armsUp = false,
        armAngleOffset = 0,
        lean = 0,
        mirror = false,
        sitting = false,
        inCar = false
      } = options;

      ctx.save();
      ctx.translate(x, y);
      
      if (inCar) {
        // Голова
        ctx.beginPath();
        ctx.arc(0, -22, 6, 0, Math.PI * 2);
        ctx.strokeStyle = '#e0f0f0';
        ctx.lineWidth = 2.2;
        ctx.stroke();
        // тело короткое
        ctx.beginPath();
        ctx.moveTo(0, -16);
        ctx.lineTo(0, -2);
        ctx.stroke();
        ctx.restore();
        return;
      }

      const bodyLength = sitting ? 13 : 18;
      const legOffsetY = sitting ? 5 : 0;

      // Голова
      ctx.beginPath();
      ctx.arc(0, -bodyLength - 2, 6, 0, Math.PI * 2);
      ctx.strokeStyle = '#d4ecec';
      ctx.lineWidth = 2.4;
      ctx.stroke();

      // Тело
      ctx.beginPath();
      ctx.moveTo(0, -bodyLength + 4);
      ctx.lineTo(0, legOffsetY);
      ctx.stroke();

      // Руки
      const shoulderY = -bodyLength + 6;
      ctx.beginPath();
      if (armsUp) {
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(-14, shoulderY - 12);
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(14, shoulderY - 12);
      } else {
        const armDir = mirror ? -1 : 1;
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(armDir * 13, shoulderY + 5);
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(-armDir * 11, shoulderY + 4);
      }
      ctx.strokeStyle = '#d4ecec';
      ctx.lineWidth = 2.2;
      ctx.stroke();

      // Ноги
      if (!sitting) {
        ctx.beginPath();
        ctx.moveTo(0, legOffsetY);
        ctx.lineTo(-8, legOffsetY + 16);
        ctx.moveTo(0, legOffsetY);
        ctx.lineTo(8, legOffsetY + 16);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(0, legOffsetY);
        ctx.lineTo(10, legOffsetY + 8);
        ctx.moveTo(0, legOffsetY);
        ctx.lineTo(-10, legOffsetY + 7);
        ctx.stroke();
      }

      ctx.restore();
    }

    // Рисование машины
    function drawCar(x, y, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#b0d0d0';
      ctx.fillStyle = '#1e3a3f';
      ctx.lineWidth = 2;

      // Кузов
      ctx.fillStyle = '#1c3238';
      ctx.beginPath();
      ctx.rect(x - car.width/2, y - car.height/2, car.width, car.height);
      ctx.fill();
      ctx.strokeStyle = '#78b8b8';
      ctx.stroke();

      // Окна
      ctx.fillStyle = '#3a5a62';
      ctx.beginPath();
      ctx.rect(x - 10, y - car.height/2 - 1, 14, 9);
      ctx.fill();
      ctx.strokeStyle = '#9acccc';
      ctx.stroke();
      ctx.beginPath();
      ctx.rect(x + 8, y - car.height/2 - 1, 10, 9);
      ctx.fill();
      ctx.stroke();

      // Колеса
      ctx.fillStyle = '#0a1a1a';
      ctx.strokeStyle = '#c0e0e0';
      ctx.beginPath();
      ctx.arc(x - 14, y + car.height/2 - 2, car.wheelRadius, 0, 2*Math.PI);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x + 14, y + car.height/2 - 2, car.wheelRadius, 0, 2*Math.PI);
      ctx.fill();
      ctx.stroke();
      
      ctx.restore();
    }

    // Очистка и отрисовка сцены
    function drawScene(scene, prog) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Рисуем землю
      ctx.beginPath();
      ctx.strokeStyle = '#2d5a5a';
      ctx.lineWidth = 1.2;
      ctx.moveTo(0, 100);
      ctx.lineTo(canvas.width, 100);
      ctx.stroke();

      if (scene === 'idle') {
        drawStickPerson(leftPerson.baseX, leftPerson.groundY, { mirror: false });
        drawStickPerson(rightPerson.baseX, rightPerson.groundY, { mirror: true });
        statusDiv.textContent = 'Мы всегда рядом, даже когда далеко 🌲';
      }
      else if (scene === 'hugging') {
        const hugProgress = Math.min(prog, 1);
        const leftX = leftPerson.baseX + 10 * hugProgress;
        const rightX = rightPerson.baseX - 10 * hugProgress;
        
        drawStickPerson(leftX, leftPerson.groundY, { armsUp: true, mirror: false });
        drawStickPerson(rightX, rightPerson.groundY, { armsUp: true, mirror: true });
        
        if (hugProgress > 0.7) {
          statusDiv.textContent = 'Крепкие объятия сквозь расстояние ✨';
        } else {
          statusDiv.textContent = 'Я тебя обнимаю...';
        }
      }
      else if (scene === 'carLeaving') {
        const leaveProgress = Math.min(prog, 1);
        
        if (leaveProgress < 0.5) {
          const subProgress = leaveProgress / 0.5;
          
          drawStickPerson(leftPerson.baseX - 2, leftPerson.groundY, { 
            armsUp: false, 
            mirror: false 
          });
          ctx.save();
          ctx.translate(leftPerson.baseX - 2, leftPerson.groundY);
          ctx.beginPath();
          ctx.moveTo(0, -12);
          ctx.lineTo(-16, -22);
          ctx.strokeStyle = '#d4ecec';
          ctx.lineWidth = 2.2;
          ctx.stroke();
          ctx.restore();

          const targetX = rightPerson.baseX + (car.x - 15 - rightPerson.baseX) * subProgress;
          drawStickPerson(targetX, rightPerson.groundY, { mirror: true, sitting: false });
          
          drawCar(car.x, car.y);
          statusDiv.textContent = 'Пора ехать... но я с тобой 💙';
        } 
        else {
          const subProgress2 = (leaveProgress - 0.5) / 0.5;
          
          drawStickPerson(leftPerson.baseX - 2, leftPerson.groundY, { mirror: false });
          ctx.save();
          ctx.translate(leftPerson.baseX - 2, leftPerson.groundY);
          ctx.beginPath();
          ctx.moveTo(0, -12);
          ctx.lineTo(-18, -24);
          ctx.strokeStyle = '#d4ecec';
          ctx.lineWidth = 2.2;
          ctx.stroke();
          ctx.restore();

          const carStartX = car.x;
          const carEndX = canvas.width + 40;
          const currentCarX = carStartX + (carEndX - carStartX) * subProgress2;
          
          drawCar(currentCarX, car.y);
          drawStickPerson(currentCarX - 8, car.y - 8, { inCar: true });
          
          if (subProgress2 > 0.8) {
            statusDiv.textContent = 'До встречи, родная. Луна светит нам обеим 🌕';
          } else {
            statusDiv.textContent = 'Машина увозит, но дружба остаётся...';
          }
        }
      }
      else if (scene === 'complete') {
        drawStickPerson(leftPerson.baseX - 2, leftPerson.groundY, { mirror: false });
        ctx.save();
        ctx.translate(leftPerson.baseX - 2, leftPerson.groundY);
        ctx.beginPath();
        ctx.moveTo(0, -12);
        ctx.lineTo(-18, -26);
        ctx.strokeStyle = '#d4ecec';
        ctx.lineWidth = 2.2;
        ctx.stroke();
        ctx.restore();
        
        drawCar(canvas.width - 15, car.y + 2, 0.7);
        drawStickPerson(canvas.width - 23, car.y - 6, { inCar: true });
        statusDiv.textContent = 'Ты уехала, но наша луна одна на двоих 🌖';
      }
    }
      // Запуск анимации сцены
      function runSceneAnimation(scene, duration = 2000, onComplete) {
        stopAnimation();
        const startTime = performance.now();
        
        function step(now) {
          const elapsed = now - startTime;
          const prog = Math.min(elapsed / duration, 1);
          
          drawScene(scene, prog);
          
          if (prog < 1) {
            animationId = requestAnimationFrame(step);
          } else {
            if (scene === 'hugging') {
              stopAnimation();
              if (onComplete) onComplete();
            } else if (scene === 'carLeaving') {
              stopAnimation();
              currentScene = 'complete';
              drawScene('complete', 1);
              if (onComplete) onComplete();
            } else {
              stopAnimation();
              if (onComplete) onComplete();
            }
          }
        }
        
        animationId = requestAnimationFrame(step);
      }

      // Основная история: объятия -> машина уезжает
      function startFullStory() {
        stopAnimation();
        currentScene = 'idle';
        drawScene('idle', 0);
        
        runSceneAnimation('hugging', 2200, () => {
          currentScene = 'carLeaving';
          runSceneAnimation('carLeaving', 3800, () => {
            currentScene = 'complete';
            drawScene('complete', 1);
          });
        });
      }

      // Привязка кнопок
      document.getElementById('hugBtn').addEventListener('click', () => {
        stopAnimation();
        startFullStory();
      });

      document.getElementById('replayBtn').addEventListener('click', () => {
        stopAnimation();
        currentScene = 'idle';
        drawScene('idle', 0);
        statusDiv.textContent = 'Ты в моём сердце, даже за тысячи километров 🌙';
      });

      // Инициализация
      drawScene('idle', 0);
      statusDiv.textContent = 'Ты в моём сердце, даже за тысячи километров 🌙';

      // Очистка при уходе со страницы
      window.addEventListener('beforeunload', () => {
        stopAnimation();
      });
    })();
  </script>
</body>
</html>
